name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - sanity_content_update
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Sanity studio
        run: |
          export SANITY_STUDIO_BASE_PATH="/${GITHUB_REPOSITORY#*/}/admin"
          pnpm cms:build
          rm -rf public/admin
          mkdir -p public/admin
          cp -R studio/dist/* public/admin/
          REPO_BASE="/${GITHUB_REPOSITORY#*/}"
          sed -i "s|href=\"/static/|href=\"${REPO_BASE}/admin/static/|g" public/admin/index.html
          sed -i "s|src=\"/static/|src=\"${REPO_BASE}/admin/static/|g" public/admin/index.html
          sed -i "s|href=\"/smsavior/admin/static/|href=\"${REPO_BASE}/admin/static/|g" public/admin/index.html
          sed -i "s|src=\"/smsavior/admin/static/|src=\"${REPO_BASE}/admin/static/|g" public/admin/index.html

      - name: Build site
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
